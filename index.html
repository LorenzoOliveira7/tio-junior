<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tio Junior - Transporte Escolar</title>

<link rel="stylesheet" href="stile.css">
</head>
<body>

<header>
<h1>Tio Junior - Transporte Escolar</h1>
<p>Controle de alunos, pagamentos e despesas</p>
</header>

<div class="container">

<h2>Cadastro de Alunos</h2>

<form id="studentForm">
<input type="text" id="nome" placeholder="Nome do aluno" required>
<input type="text" id="pais" placeholder="Nome do pai/mãe" required>
<input type="number" id="idade" placeholder="Idade" required>
<input type="text" id="bairro" placeholder="Bairro" required>
<input type="number" id="valor" placeholder="Valor mensal (R$)" required>

<button type="submit">
Adicionar Aluno
</button>
</form>

<h2>Lista de Alunos</h2>

<input
type="text"
id="search"
placeholder="🔎 Pesquisar aluno..."
>

<div class="card">
<table>

<thead>
<tr>
<th>Nome</th>
<th>Pais</th>
<th>Idade</th>
<th>Bairro</th>
<th>Valor</th>
<th>Meses Pagos</th>
<th>Editar</th>
<th>Excluir</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>
</div>

<h2>Adicionar Despesa</h2>

<form id="expenseForm">
<input type="text" id="descDespesa" placeholder="Descrição da despesa" required>
<input type="number" id="valorDespesa" placeholder="Valor da despesa" required>

<button type="submit">
Adicionar Despesa
</button>
</form>

<div class="card">
<table>

<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th>Excluir</th>
</tr>
</thead>

<tbody id="expenseTable"></tbody>

</table>
</div>

<div class="summary" id="totalAlunos"></div>
<div class="summary" id="totalDespesas"></div>
<div class="summary" id="saldoFinal"></div>

</div>

<script src="js.js"></script>

</body>
</html>
